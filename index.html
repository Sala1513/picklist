<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Picklist Processor</title>

<style>
body{
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
text-align:center;
}
button{
padding:12px 25px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:15px;
font-size:15px;
}
</style>
</head>

<body>

<div class="box">
<h2>PROCESS PICKLIST</h2>

<input type="file" id="pdf" accept="application/pdf"><br><br>
<input type="file" id="map"><br><br>

<button onclick="upload()">PROCESS</button>

<p id="status"></p>
<a id="download" style="display:none"></a>
</div>

<script>
async function upload(){

const pdf=document.getElementById("pdf").files[0];
const map=document.getElementById("map").files[0];
const status=document.getElementById("status");

if(!pdf||!map){
alert("Upload both files");
return;
}

status.innerText="Processing...";

const form=new FormData();
form.append("pdf",pdf);
form.append("map",map);

const res=await fetch("/.netlify/functions/process",{
method:"POST",
body:form
});

if(!res.ok){
status.innerText="Server error";
return;
}

const blob=await res.blob();
const url=URL.createObjectURL(blob);

const link=document.getElementById("download");
link.href=url;
link.download=`Sorted_Shipment_Picklist_${new Date().toISOString().slice(0,10)}.pdf`;
link.innerText="Download PDF";
link.style.display="block";

status.innerText="Done ✔";
}
</script>

</body>
</html>
